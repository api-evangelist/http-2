aid: http-2
name: HTTP/2
description: >-
  HTTP/2 is the second major version of the HTTP protocol, providing
  significant improvements over HTTP/1.1 including multiplexing, header
  compression, server push, and stream prioritization. It is defined in
  RFC 7540 and was standardized in 2015.
